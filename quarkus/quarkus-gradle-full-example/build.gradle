plugins {
  id "java"
  id "io.quarkus"
}

repositories {
  mavenCentral()
  mavenLocal()
}

dependencies {

  compileOnly("org.projectlombok:lombok:1.18.46")
  annotationProcessor("org.projectlombok:lombok:1.18.46")

  implementation enforcedPlatform("${quarkusPlatformGroupId}:${quarkusPlatformArtifactId}:${quarkusPlatformVersion}")
  implementation("io.quarkus:quarkus-jdbc-postgresql")
  implementation("net.java.dev.jna:jna")
  implementation("io.quarkus:quarkus-flyway")
  implementation("io.quarkus:quarkus-jackson")
  implementation("io.quarkus:quarkus-resteasy-jackson")
  implementation("io.quarkus:quarkus-smallrye-openapi")
  implementation("io.quarkus:quarkus-scheduler")
  implementation("io.quarkus:quarkus-kafka-client")

  implementation("jakarta.servlet:jakarta.servlet-api:6.1.0") // graalvm thymeleaf fix

  implementation platform("org.jdbi:jdbi3-bom:3.54.0")
  implementation("org.jdbi:jdbi3-core")

  implementation("org.thymeleaf:thymeleaf:3.1.5.RELEASE")


  implementation("com.mageddo.rapids-kafka-client:rapids-kafka-client:2.0.6")
  implementation("org.apache.commons:commons-lang3:3.18.0")

  testCompileOnly("org.projectlombok:lombok:1.18.46")
  testAnnotationProcessor("org.projectlombok:lombok:1.18.46")
  testImplementation("io.quarkus:quarkus-junit5")
  testImplementation("io.rest-assured:rest-assured")
  testImplementation("org.mockito:mockito-junit-jupiter:5.23.0")

  testImplementation("io.zonky.test:embedded-postgres:1.2.5")
  testRuntimeOnly enforcedPlatform("io.zonky.test.postgres:embedded-postgres-binaries-bom:12.2.0")

}

group "com.mageddo"
version "1.0.0-SNAPSHOT"

compileJava {
  options.encoding = "UTF-8"
  options.compilerArgs << "-parameters"
}

compileTestJava {
  options.encoding = "UTF-8"
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}

tasks.withType(JavaCompile).configureEach {
  options.release = 25
}

test {
  systemProperty "java.util.logging.manager", "org.jboss.logmanager.LogManager"
}
