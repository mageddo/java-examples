plugins {
  id 'java'
  id 'io.quarkus' version '3.35.3'
}

group = 'com.mageddo.temporal'
version = '1.0.0-SNAPSHOT'

repositories {
  mavenCentral()
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}

dependencies {
  implementation enforcedPlatform('io.quarkus.platform:quarkus-bom:3.35.3')
  implementation 'io.quarkus:quarkus-arc'
  implementation 'io.quarkus:quarkus-flyway'
  implementation 'io.quarkus:quarkus-hibernate-orm'
  implementation 'io.quarkus:quarkus-jdbc-postgresql'
  implementation 'io.temporal:temporal-sdk:1.35.0'
  implementation 'org.projectlombok:lombok:1.18.46'
  annotationProcessor 'org.projectlombok:lombok:1.18.46'

  testImplementation platform('org.junit:junit-bom:5.13.1')
  testImplementation 'org.junit.jupiter:junit-jupiter'
  testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
  testImplementation 'org.assertj:assertj-core:3.27.7'
  testImplementation 'io.temporal:temporal-testing:1.35.0'
  testImplementation 'io.zonky.test:embedded-postgres:2.2.2'
  testImplementation 'io.quarkus:quarkus-junit5'
  testImplementation 'org.projectlombok:lombok:1.18.46'
  testAnnotationProcessor 'org.projectlombok:lombok:1.18.46'
}

tasks.withType(Test).configureEach {
  useJUnitPlatform()
}
