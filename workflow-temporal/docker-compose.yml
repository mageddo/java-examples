services:
  postgres-17:
    image: postgres:17.6
    environment:
      - TZ=UTC
      - POSTGRES_PASSWORD=root
      - POSTGRES_USER=root
      - POSTGRES_DB=db
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5443:5432"
    network_mode: bridge
    mem_limit: 1024m
    memswap_limit: 0
    cpu_count: 2

volumes:
  postgres:
