# https://github.com/open-telemetry/opentelemetry-collector/blob/main/receiver/otlpreceiver/README.md
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ":4317"
      http:
        endpoint: ":4318"

connectors:
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/v0.120.0/connector/spanmetricsconnector/README.md#more-examples
  spanmetrics:
    dimensions:
      - name: status.code
      - name: http.method
      - name: http.response.status_code
      - name: http.status_code
      - name: http.route
      - name: code.function
      - name: code.namespace
    exemplars:
      enabled: true
    dimensions_cache_size: 1000
    aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
    metrics_flush_interval: 15s
    metrics_expiration: 5m
    events:
      enabled: true
      dimensions:
        - name: exception.type
        - name: exception.message
    resource_metrics_key_attributes:
      - host.name
      - service.name
      - telemetry.sdk.version
      - service.version
      - webengine.version

processors:
  tail_sampling:
    decision_wait: 5s
    num_traces: 1000
    expected_new_traces_per_sec: 100
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: 20
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/cdd2c16a95b49e4b11e3dee8a5d92ae8ba80e6d0/processor/filterprocessor
  filter/traces: # soh lentos ou com erros (se a condicao abaixo der true, eh ignorado)
    error_mode: ignore
    traces:
      span:
        - status.code < 2 and (end_time - start_time) <= Duration("500ms")
        # - attributes["http.route"] == '/q/health'

  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/cumulativetodeltaprocessor
  # cumulativetodelta:

  # https://github.com/open-telemetry/opentelemetry-collector/tree/main/processor/batchprocessor
  batch:

# Remover properties que não entregam valor
resource/drop-noisy-attrs:
  attributes:
    - key: telemetry.sdk.language
      action: delete
    - key: telemetry.sdk.name
      action: delete
    - key: webengine.name
      action: delete

exporters:

  debug:
    verbosity: detailed

  prometheus:
    endpoint: ":9595"
    namespace: "otel"
    send_timestamps: true
    metric_expiration: 180m
    enable_open_metrics: true
    add_metric_suffixes: false
    resource_to_telemetry_conversion:
      enabled: true

  # https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/otlpexporter
  otlp:
    endpoint: "http://jaeger:4317"
    tls:
      insecure: true

service:
  
  pipelines:
  
    traces/metrics:
      receivers: [ otlp ]
      processors: [ resource/drop-noisy-attrs, batch ]
      exporters: [ spanmetrics ]

    # desligando o jaeger
    #traces/filtered:
    #  receivers: [ otlp ]
    #  processors: [ tail_sampling, batch ]
    #  exporters: [ otlp ] 
    
    metrics:
      receivers: [ otlp, spanmetrics ]
      processors: [ batch ]
      exporters: [ prometheus ]
  
  telemetry:
    logs:
      level: "info"
    metrics:
      address: ":9696"
