plugins {
  id 'java'
  id 'io.quarkus'
}

repositories {
  mavenCentral()
  mavenLocal()
}

dependencies {
  implementation enforcedPlatform("${quarkusPlatformGroupId}:${quarkusPlatformArtifactId}:${quarkusPlatformVersion}")

  implementation 'io.quarkus:quarkus-rest'
  implementation 'io.quarkus:quarkus-arc'
  implementation 'io.quarkus:quarkus-scheduler'

  // Micrometer
  implementation 'io.quarkus:quarkus-micrometer'

  // para @Timed funcionar e expor métricas no /q/metrics
  implementation 'io.quarkus:quarkus-micrometer-registry-prometheus'

  // Para fazer trace programático com a api do micrometer
  implementation 'io.micrometer:micrometer-tracing:1.6.6'
  implementation 'io.micrometer:micrometer-tracing-bridge-otel:1.6.6'

  // Para as métricas serem enviadas para o OTLP collector
  implementation 'io.quarkus:quarkus-micrometer-opentelemetry'
  implementation 'io.micrometer:micrometer-registry-otlp'
  implementation group: 'io.opentelemetry', name: 'opentelemetry-exporter-otlp'

  // Para o report de tracing funcionar
  implementation 'io.quarkus:quarkus-opentelemetry'

  compileOnly 'org.projectlombok:lombok:1.18.46'
  annotationProcessor 'org.projectlombok:lombok:1.18.46'

  testCompileOnly 'org.projectlombok:lombok:1.18.46'
  testAnnotationProcessor 'org.projectlombok:lombok:1.18.46'

  testImplementation 'io.quarkus:quarkus-junit5'
  testImplementation 'io.rest-assured:rest-assured'
}

group 'com.mageddo'
version '1.0.0-SNAPSHOT'

java {
  sourceCompatibility = JavaVersion.VERSION_25
  targetCompatibility = JavaVersion.VERSION_25
}

test {
  systemProperty "java.util.logging.manager", "org.jboss.logmanager.LogManager"
}

compileJava {
  options.encoding = 'UTF-8'
  options.compilerArgs << '-parameters'
}

compileTestJava {
  options.encoding = 'UTF-8'
}
